<div *ngIf="pokemon"><!--| async as pokemon">-->
  <figure class="card card--{{ pokemon.apiTypes[0]?.name }}">

    <div class="card__image-container">
      <img
        [src]="pokemon.apiTypes[0]?.image"
        [alt]="pokemon.apiTypes[0]?.name"
        class="card__image">
    </div>

    <div *ngIf="pokemon.apiTypes[1]">
      <div class="card__image-container">
        <img
          [src]="pokemon.apiTypes[1]?.image"
          [alt]="pokemon.apiTypes[1]?.name"

          class="card__image">
      </div>
    </div>

    <p>
      Types: {{ pokemon.apiTypes?.[0]?.name }} - {{ pokemon.apiTypes?.[1]?.name }}
    </p>

    <div class="card__image-container">
      <img
        [src]="pokemon.image"
        [alt]="pokemon.name"
        class="card__image">
    </div>

    <figcaption class="card__caption">
      <h1 class="card__name">{{ pokemon.name | titlecase }}</h1>
    </figcaption>
  </figure>
</div>
