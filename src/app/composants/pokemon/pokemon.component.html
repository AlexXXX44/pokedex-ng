<div *ngIf="pokemon$ | async as pokemon">
  <figure class="card card--{{ pokemon.types[0].type.name }}">
    <div class="card__image-container">
      <img [src]="pokemon.sprites.other.dream_world.front_default" [alt]="pokemon.types"
           class="card__image" fill>
    </div>
    <figcaption class="card__caption">
<!--      <h1 class="card__name">{{pokemon.name | titlecase}}</h1>-->
    </figcaption>
  </figure>
</div>
